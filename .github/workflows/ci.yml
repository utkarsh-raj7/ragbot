name: ci

on:
  push:
    branches: main

jobs:
  build-:
    runs-on: ubuntu-latest
    steps:
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: actions/checkout@v4
      - name: Build the Docker image
        run: docker build . --file Dockerfile --tag ${{ secrets.DOCKERHUB_USERNAME }}/ragbot_dockerhub_repository:ragbot_${{ github.sha }}
      - name: Build the Docker image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/ragbot_dockerhub_repository:ragbot_${{ github.sha }}

    